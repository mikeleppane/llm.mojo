[workspace]
name = "mojo-llm-from-scratch"
version = "0.1.0"
description = "Build a small Transformer language model from scratch in Mojo"
channels = ["https://conda.modular.com/max/", "conda-forge"]
platforms = ["linux-64"]

[dependencies]
mojo = "==1.0.0b2,<2"
python = "3.12.*"
numpy = "*"
matplotlib = "*"
jupyterlab = "*"
ipykernel = "*"
regex = ">=2026.6.28,<2027"

[tasks]
mojo-version = "mojo --version"
hello = "mojo run examples/hello.mojo"
# Rewrites files in place — run locally before committing.
fmt = "mojo format src tests examples benchmarks"
# CI gate: format, then fail if anything changed (never edits in CI).
fmt-check = "mojo format src tests examples benchmarks && git diff --exit-code"
# CANONICAL green gate — smoke test first, then every test EXCEPT the files in
# SLOW_6554 (currently only test_seq_tasks.mojo, which trips Mojo #6554 and can
# hang a run). Prints a loud per-file SKIPPED line so the exclusion is visible.
# This is what CI runs and what "green" means everywhere in the docs.
test = "bash scripts/test_all.sh"
# Alias of `test`, kept so older docs and muscle memory keep working — both skip
# the SLOW_6554 files. Prefer `test`; there is no longer a "fast vs full" default.
test-fast = "bash scripts/test_all.sh"
# Superset of `test` that ALSO runs the SLOW_6554 files (RUN_SLOW=1). NOT the gate:
# it can hang on #6554. Its one job is the toolchain-upgrade check — run it once
# after bumping the pinned Mojo version to see whether #6554 is fixed upstream
# (see AGENTS.md). Otherwise prefer running a changed slow file standalone.
test-full = "RUN_SLOW=1 bash scripts/test_all.sh"
test-smoke = "mojo run -I src tests/test_smoke.mojo"
# Tier 2 release gate — the 124M gauntlet. Verifies checkpoints/gpt2-124m.bin
# matches the goldens' pinned sha256, precompiles the package, then runs the
# multi-prompt harness (fails with a converter-pointing error if the weights are
# absent). Minutes-scale, run locally before every merge to main. NOT in CI.
gauntlet = "bash scripts/run_gauntlet.sh"
# Compile-check (does NOT run) every file in examples/ and benchmarks/ against the
# precompiled package at -O0 — seconds per file, no weights. Catches example/bench
# bit-rot that the suite never sees. CI runs this; running the examples stays Tier 2.
build-examples = "bash scripts/build_examples.sh"
